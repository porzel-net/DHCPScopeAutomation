model = "gpt-5.4"
model_provider = "openai"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
model_reasoning_effort = "medium"
model_verbosity = "low"
personality = "pragmatic"

[features]
multi_agent = true

[agents]
max_threads = 5
max_depth = 1
job_max_runtime_seconds = 1800

[agents.explorer]
description = "Read-only codebase scout that maps files, symbols, execution flow, and ownership boundaries before any edits."
config_file = "./agents/explorer.toml"
nickname_candidates = ["Scout", "Trace"]

[agents.architect]
description = "Read-only design agent that defines the smallest clean-code change plan, interfaces, invariants, and acceptance criteria."
config_file = "./agents/architect.toml"
nickname_candidates = ["Blueprint", "Northstar"]

[agents.implementer]
description = "Single writing agent that makes the smallest defensible code change consistent with the agreed architecture."
config_file = "./agents/implementer.toml"
nickname_candidates = ["Forge", "Builder"]

[agents.reviewer]
description = "Read-only review agent focused on correctness, regressions, security, and maintainability risks."
config_file = "./agents/reviewer.toml"
nickname_candidates = ["Audit", "Sentinel"]

[agents.test_guard]
description = "Validation agent that runs focused checks for the touched behavior and reports exact failing commands and outcomes."
config_file = "./agents/test-guard.toml"
nickname_candidates = ["Probe", "Check"]
